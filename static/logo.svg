<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)"/>

  <!-- Outer ring -->
  <circle cx="256" cy="256" r="195" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>

  <!-- Plate -->
  <ellipse cx="256" cy="285" rx="130" ry="65" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="2.5"/>
  <ellipse cx="256" cy="280" rx="100" ry="48" fill="rgba(255,255,255,0.05)"/>
  
  <!-- Fork left -->
  <line x1="155" y1="310" x2="170" y2="200" stroke="rgba(255,255,255,0.2)" stroke-width="3" stroke-linecap="round"/>
  <line x1="155" y1="200" x2="155" y2="185" stroke="rgba(255,255,255,0.2)" stroke-width="2" stroke-linecap="round"/>
  <line x1="162" y1="200" x2="162" y2="185" stroke="rgba(255,255,255,0.2)" stroke-width="2" stroke-linecap="round"/>
  <line x1="170" y1="200" x2="170" y2="185" stroke="rgba(255,255,255,0.2)" stroke-width="2" stroke-linecap="round"/>
  <line x1="148" y1="200" x2="148" y2="185" stroke="rgba(255,255,255,0.2)" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Knife right -->
  <line x1="340" y1="310" x2="340" y2="200" stroke="rgba(255,255,255,0.2)" stroke-width="3" stroke-linecap="round"/>
  <path d="M340 200 Q350 210 350 230 Q350 250 340 260" stroke="rgba(255,255,255,0.2)" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Fire/calorie symbol on the plate -->
  <g transform="translate(256,260)">
    <!-- Flame body -->
    <path d="M0 40 Q-20 25 -18 8 Q-16 -5 -8 -12 Q-4 -16 0 -25 Q4 -16 8 -12 Q16 -5 18 8 Q20 25 0 40Z" 
          fill="rgba(255,255,255,0.35)"/>
    <!-- Inner flame highlight -->
    <path d="M0 35 Q-10 22 -9 10 Q-7 2 -2 -3 Q0 -6 0 -12 Q0 -6 2 -3 Q7 2 9 10 Q10 22 0 35Z" 
          fill="rgba(255,255,255,0.5)"/>
    <!-- Small spark -->
    <circle cx="6" cy="-10" r="2" fill="rgba(255,255,255,0.6)"/>
    <circle cx="-4" cy="-8" r="1.5" fill="rgba(255,255,255,0.4)"/>
  </g>

  <!-- "kcal" text at bottom of plate -->
  <text x="256" y="330" text-anchor="middle" font-size="28" font-weight="700" font-family="Inter,sans-serif" fill="rgba(255,255,255,0.25)">kcal</text>

  <!-- Scanning ring -->
  <circle cx="256" cy="256" r="155" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1.5" stroke-dasharray="8 6"/>
</svg>
